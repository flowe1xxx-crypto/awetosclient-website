<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night DLC | Loader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Special overrides for loader window */
        body {
            overflow: hidden;
            height: 100vh;
            background: transparent;
        }

        .loader-window {
            height: 100vh;
            width: 100vw;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            border: 1px solid var(--glass-border);
        }

        .loader-header {
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            -webkit-app-region: drag;
        }

        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .status-bar {
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid var(--glass-border);
            font-size: 0.75rem;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            position: absolute;
            bottom: 0;
            left: 0;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            width: 0%;
            transition: 0.3s;
            box-shadow: 0 0 10px var(--primary-glow);
        }
    </style>
</head>

<body>
    <div class="loader-window">
        <header class="loader-header">
            <div style="font-weight: 900; letter-spacing: 1px;">NIGHT <span style="color: var(--primary);">DLC</span>
            </div>
            <div style="display: flex; gap: 15px; -webkit-app-region: no-drag;">
                <div class="nav-btn-icon" onclick="window.parent.postMessage({type: 'close'}, '*')"><i
                        class="fas fa-times"></i></div>
            </div>
        </header>

        <main class="main-content">
            <!-- Login State -->
            <div id="login-view" style="display: none;">
                <div style="text-align: center; margin-bottom: 30px;">
                    <h2 style="font-size: 1.2rem; margin-bottom: 5px;">АВТОРИЗАЦИЯ</h2>
                    <p style="font-size: 0.75rem; color: var(--text-dim);">Войдите в свой аккаунт Night DLC</p>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="text" id="username" placeholder="Email / Username">
                    </div>
                </div>
                <div class="input-group">
                    <label>Пароль</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Password">
                    </div>
                </div>
                <button class="btn-submit" onclick="handleLogin()" style="margin-top: 20px;">
                    <i class="fas fa-sign-in-alt"></i> ВОЙТИ
                </button>
            </div>

            <!-- Dashboard State -->
            <div id="dashboard-view">
                <div style="display: flex; gap: 20px; align-items: center; margin-bottom: 30px;">
                    <div class="avatar-large" style="width: 50px; height: 50px; font-size: 1rem;">N</div>
                    <div>
                        <h3 id="user-display">Welcome Back</h3>
                        <p id="subscription-status" style="font-size: 0.7rem; color: var(--primary);">Loading session...
                        </p>
                    </div>
                    <button class="btn-profile glass" onclick="showAccountModal()"
                        style="margin-left: auto; padding: 10px 15px;">
                        <i class="fas fa-info-circle"></i> Инфо
                    </button>
                </div>

                <div class="glass" style="padding: 20px; border-radius: 16px; margin-bottom: 25px;">
                    <h4 style="font-size: 0.8rem; margin-bottom: 15px; color: var(--text-dim);">LAST NEWS</h4>
                    <p style="font-size: 0.85rem; line-height: 1.5;">Night DLC v2.0 Released. Added new bypasses and
                        optimized renderer for better performance on weak PCs.</p>
                </div>

                <div style="display: flex; gap: 15px;">
                    <div style="flex: 1;">
                        <label
                            style="font-size: 0.65rem; color: var(--text-dim); display: block; margin-bottom: 5px;">MEMORY
                            (RAM)</label>
                        <select id="ram-select" class="activate-input"
                            style="width: 100%; border-radius: 8px; padding: 10px;">
                            <option value="2048">2 GB</option>
                            <option value="4096" selected>4 GB</option>
                            <option value="6144">6 GB</option>
                            <option value="8192">8 GB</option>
                        </select>
                    </div>
                    <button class="btn-submit" onclick="handleLaunch()" style="flex: 1.5;">
                        <i class="fas fa-play"></i> ЗАПУСТИТЬ
                    </button>
                </div>
            </div>
        </main>

        <footer class="status-bar">
            <span id="status-text">Ready to launch</span>
            <span id="version-text">v1.2.1-DLC</span>
            <div class="progress-container">
                <div class="progress-bar" id="main-progress"></div>
            </div>
        </footer>
    </div>

    <!-- Account Modal -->
    <div id="account-modal"
        style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 2000; align-items: center; justify-content: center; padding: 20px;">
        <div class="glass"
            style="width: 100%; max-width: 400px; padding: 30px; border-radius: 20px; position: relative;">
            <div style="position: absolute; top: 15px; right: 20px; cursor: pointer;" onclick="hideAccountModal()"><i
                    class="fas fa-times"></i></div>
            <h3 style="margin-bottom: 25px;">ACCOUNT DETAILS</h3>
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <div style="display: flex; justify-content: space-between; font-size: 0.8rem;">
                    <span style="color: var(--text-dim);">USERNAME</span>
                    <span id="modal-user">-</span>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 0.8rem;">
                    <span style="color: var(--text-dim);">UID</span>
                    <span id="modal-uid">-</span>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 0.8rem;">
                    <span style="color: var(--text-dim);">EXPIRY</span>
                    <span id="modal-expiry">-</span>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 0.8rem;">
                    <span style="color: var(--text-dim);">HWID</span>
                    <span id="modal-hwid" style="font-family: monospace; font-size: 0.7rem;">-</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Use the existing logic from static/loader/js/script.js but adapted if needed
        // For simplicity and speed, I'll assume the script.js handles the logic
        // but I'll add a check to make sure the views switch correctly.
    </script>
    <script src="{{ url_for('static', filename='loader/js/script.js') }}"></script>
</body>

</html>
