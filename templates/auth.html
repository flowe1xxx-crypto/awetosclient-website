<!DOCTYPE html>
<html lang="ru" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AwetosClient | Авторизация</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="bg-glow"></div>
    <div class="bg-pills">
        <div class="pill pill-1"></div>
        <div class="pill pill-2"></div>
        <div class="pill pill-3"></div>
    </div>
    <canvas id="particles"></canvas>

    <nav class="nav-centered">
        <div class="nav-container glass">
            <a href="{{ url_for('index') }}" class="nav-logo">AwetosClient</a>
            <div class="nav-items">
                <a href="{{ url_for('index') }}"><i class="fas fa-home"></i> Главная</a>
                <a href="{{ url_for('buy') }}"><i class="fas fa-shopping-bag"></i> Продукты</a>
                <a href="{{ url_for('privacy') }}"><i class="fas fa-book"></i> Политика конфиденциальности</a>
                <a href="{{ url_for('terms') }}"><i class="fas fa-gavel"></i> Условия использования</a>
            </div>
            <div class="nav-right">
                <div class="nav-btn-icon" id="theme-btn"><i class="fas fa-moon"></i></div>
                <div class="nav-btn-icon" id="lang-btn" style="font-size: 0.7rem; font-weight: 800; gap: 4px;">🇷🇺 RUS <i
                        class="fas fa-chevron-down" style="font-size: 0.5rem;"></i></div>
                <a href="{{ url_for('login') }}" class="btn-login">Войти</a>
                <a href="{{ url_for('register') }}" class="btn-register">Регистрация</a>
            </div>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-card glass animate-fade">
            <div class="auth-tabs">
                <button class="auth-tab {{ 'active' if mode == 'login' else '' }}" onclick="location.href='{{ url_for('login') }}'">
                    <i class="fas fa-right-to-bracket"></i> Вход
                </button>
                <button class="auth-tab {{ 'active' if mode == 'register' else '' }}" onclick="location.href='{{ url_for('register') }}'">
                    <i class="fas fa-user-plus"></i> Регистрация
                </button>
            </div>

            <form action="{{ url_for('login' if mode == 'login' else 'register') }}" method="POST" class="auth-form">
                <div class="input-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="text" name="username" placeholder="Введите email" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Пароль</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" placeholder="Введите пароль" required>
                    </div>
                </div>

                <div class="auth-footer">
                    <label class="remember-box">
                        <input type="checkbox" id="remember">
                        <span>Запомнить меня</span>
                    </label>
                    <a href="#" class="auth-link">Забыли пароль?</a>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-bolt"></i> {{ 'Войти' if mode == 'login' else 'Создать аккаунт' }}
                </button>
            </form>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/particles.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
